services:
  - type: web
    name: custom-ecommerce-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 4000
      - key: TARGET_PROFIT_MARGIN
        value: 0.15
      - key: FRONTEND_BASE_URL
        value: https://custom-ecommerce-seven.vercel.app
      - key: API_BASE_URL
        value: https://custom-ecommerce-qp30.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://custom-ecommerce-seven.vercel.app
      - key: PRINTIFY_WEBHOOK_URL
        value: https://custom-ecommerce-qp30.onrender.com/api/webhooks/printify
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_OWNER_CHAT_ID
        sync: false
      - key: PRINTIFY_API_TOKEN
        sync: false
      - key: ENABLE_PRINTIFY_SYNC
        value: "true"
      - key: PRINTIFY_SHOP_ID
        value: "27495153"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPLUS_API_KEY
        sync: false
      - key: DRIP_ADMIN_SECRET
        sync: false
