<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Phase 11.1: favicons point to the new metallic D logo. Browsers scale the
         1024x1024 source down per size; the .ico fallback is kept for legacy
         Windows shells that don't accept PNG. -->
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-new.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-new.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-new.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-new.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo-new.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="dns-prefetch" href="https://api-m.paypal.com" />
    <link rel="dns-prefetch" href="https://www.paypal.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="ULZe2dHzhtPOPyum-6vW0zZZa0yuBjQ9YDdB953wc2c" />
    <title>Drip Street Shop | Minimalist Streetwear</title>
    <meta name="description" content="Premium minimal streetwear built for confidence. Shop oversized tees, summer tanks, and high-quality basics. Worldwide shipping." />
    <link rel="canonical" href="https://dripstreetshop.com/" />
    <meta property="og:title" content="DRIP STREET | Minimalist Streetwear" />
    <meta property="og:description" content="Premium minimal streetwear built for confidence. Shop oversized tees, summer tanks, and high-quality basics. Worldwide shipping." />
    <meta property="og:url" content="https://dripstreetshop.com/" />
    <meta property="og:type" content="website" />
    <!-- Phase 11.1: share image is the new metallic D logo. Absolute URL is
         required by Open Graph / Twitter Card crawlers. Width=height because
         the source asset is square — most social platforms accept this. -->
    <meta property="og:image" content="https://dripstreetshop.com/logo-new.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://dripstreetshop.com/logo-new.png" />
  </head>
